<h2>视觉风格偏好</h2>
<p class="subtitle">选择应用的整体外观风格</p>

<div class="options">
  <div class="option" data-choice="dark" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>深色主题 (Dark Theme)</h3>
      <p>深色背景配亮色波形，护眼，适合长时间使用。工程工具常见风格。</p>
    </div>
  </div>

  <div class="option" data-choice="light" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>浅色主题 (Light Theme)</h3>
      <p>浅色背景，现代简洁，参考 Logic2 默认风格。</p>
    </div>
  </div>

  <div class="option" data-choice="custom" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>可自定义主题</h3>
      <p>让用户切换深/浅色，并支持主题色调整。</p>
    </div>
  </div>
</div>
