<h2>I2C 波形颜色方案</h2>
<p class="subtitle">SCL 和 SDA 线用什么颜色区分？</p>

<div class="options">
  <div class="option" data-choice="classic" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>经典配色</h3>
      <p>SCL 黄色，SDA 绿色（参考标准示波器）</p>
    </div>
  </div>

  <div class="option" data-choice="logic2" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Logic2 风格</h3>
      <p>SCL 蓝色，SDA 橙色（Logic2 默认配色）</p>
    </div>
  </div>

  <div class="option" data-choice="custom" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>自定义配色</h3>
      <p>让用户自己选择 SCL/SDA 颜色</p>
    </div>
  </div>
</div>
