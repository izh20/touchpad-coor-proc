<h2>标签页布局 - 你选择了标签页切换</h2>
<p class="subtitle">请选择标签页的排列方式和内容布局</p>

<div class="options">
  <div class="option" data-choice="horizontal" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>水平标签栏 + 均分布局</h3>
      <p>顶部水平标签栏，三个标签等宽分布。适合标准窗口。</p>
    </div>
  </div>

  <div class="option" data-choice="sidebar" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>左侧垂直标签栏</h3>
      <p>左侧垂直标签堆叠，右侧主内容区更宽敞。适合宽屏或波形查看。</p>
    </div>
  </div>

  <div class="option" data-choice="floating" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>浮动标签栏 + 可拖拽</h3>
      <p>标签栏可拖拽定位，窗口自由布局。灵活性最高。</p>
    </div>
  </div>
</div>
